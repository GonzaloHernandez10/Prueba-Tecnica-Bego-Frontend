<div class="timeline">
    @for(des of destinations; track $index; let isFirst = $first) {
    <div class="timeline-point">
        <div class="timeline-icon-wrapper">
            @if(isFirst){
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="3" width="15" height="13"></rect>
                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                <circle cx="18.5" cy="18.5" r="2.5"></circle>
            </svg>
            } @else {
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-yellow)" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            }
        </div>
        <div class="location-info">
            <p class="label">{{ des.nickname | uppercase }}</p>
            <h4>{{ des.address | extractCity }}</h4>
            <p class="address">{{ des.address }}</p>
        </div>
        <div class="time-info">
            <p class="date">{{ des.start_date | date:"dd/MM/yyyy" }}</p>
            <p class="time">{{ des.start_date | date:"HH:mm" }}</p>
        </div>
    </div>
    }
</div>
