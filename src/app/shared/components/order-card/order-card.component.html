<article class="order-card">
  <header class="card-header">
    <div class="truck-type">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="var(--text-primary)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="2" y="4" width="16" height="12" rx="1"></rect>
        <path d="M18 8h3a1 1 0 0 1 1 1v5h-4V8z"></path>
        <circle cx="6" cy="18" r="2"></circle>
        <circle cx="17" cy="18" r="2"></circle>
      </svg>
      <span>{{ order.type }}</span>
    </div>
    <div class="status-indicator">
      <span class="dot" [ngClass]="order.status_class"></span>
      {{ order.status_string }}
    </div>
  </header>

  <div class="card-body">
    <app-order-timeline [destinations]="order.destinations"></app-order-timeline>
  </div>

  <footer class="card-footer">
    <button
      class="btn left"
      [class.btn-primary]="isNavigable()"
      [class.btn-timer]="!isNavigable()"
      [disabled]="!isNavigable()"
      (click)="onNavigateClick()"
    >
      {{ timeRemaining() }}
    </button>
    <button class="btn btn-primary right" (click)="onResumeClick()">
      Resume
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </footer>
</article>
